services:
  max-forward-bot:
    build:
      context: .
      args:
        # Индекс для pip при сборке образа (зеркало, если pypi.org не открывается)
        PIP_INDEX_URL: https://mirror.yandex.ru/mirrors/pypi/simple/
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Это сохраняет config.json даже после удаления контейнера
